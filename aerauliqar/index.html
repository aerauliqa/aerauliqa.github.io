<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f0e;
      --surface:   #131918;
      --border:    rgba(255,255,255,0.07);
      --accent:    #a8f0c6;
      --accent2:   #5fe3a1;
      --text:      #e8ede9;
      --muted:     #6b7a71;
      --radius:    18px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── Background grain + radial glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 0%, rgba(168,240,198,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 90%, rgba(95,227,161,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none; opacity: .5;
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
      gap: 0;
    }

    /* ── Icon placeholder ── */
    .app-icon {
      width: 96px; height: 96px;
      border-radius: 22px;
      background: linear-gradient(135deg, #1e2e26 0%, #243329 100%);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2rem;
      box-shadow: 0 0 0 1px rgba(168,240,198,0.08), 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeUp .7s ease both;
    }
    .app-icon svg { width: 48px; height: 48px; }

    /* ── Heading ── */
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-align: center;
      margin-bottom: .6rem;
      animation: fadeUp .7s .1s ease both;
    }
    h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--accent);
    }

    .tagline {
      font-size: .95rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2.8rem;
      letter-spacing: .01em;
      animation: fadeUp .7s .2s ease both;
    }

    /* ── Redirect notice ── */
    .redirect-notice {
      font-size: .8rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
      padding: .5rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: rgba(255,255,255,0.02);
      animation: fadeUp .7s .25s ease both;
      display: flex; align-items: center; gap: .5rem;
    }
    .redirect-notice .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.8s infinite;
      flex-shrink: 0;
    }

    /* ── Buttons ── */
    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
      animation: fadeUp .7s .35s ease both;
    }

    .store-btn {
      display: flex; align-items: center;
      gap: 1rem;
      padding: 1rem 1.4rem;
      border-radius: var(--radius);
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      transition: border-color .2s, background .2s, transform .15s, box-shadow .2s;
      position: relative; overflow: hidden;
    }
    .store-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(120deg, rgba(168,240,198,0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .25s;
    }
    .store-btn:hover {
      border-color: rgba(168,240,198,0.25);
      background: #181f1c;
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.35), 0 0 0 1px rgba(168,240,198,0.1);
    }
    .store-btn:hover::before { opacity: 1; }
    .store-btn:active { transform: translateY(0); }

    .store-btn svg { flex-shrink: 0; }

    .btn-text { display: flex; flex-direction: column; }
    .btn-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; line-height: 1; margin-bottom: .2rem; }
    .btn-name  { font-size: 1rem; font-weight: 400; line-height: 1; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: .75rem;
      width: 100%; max-width: 320px;
      color: var(--muted); font-size: .72rem; letter-spacing: .06em;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Footer ── */
    footer {
      margin-top: 3.5rem;
      font-size: .72rem;
      color: var(--muted);
      text-align: center;
      animation: fadeUp .7s .5s ease both;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .3; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- App icon -->
  <div class="app-icon">
    <img src="icon_aq_1024_trasp.png" alt="App Icon" style="width:96px;height:96px;">
  </div>

  <!-- Title -->
  <h1>AerauliqaR</h1>
  <p class="tagline">L'app di AERAULIQA per comunicare con il dispositivo R1</p>

  <!-- Redirect notice -->
  <div class="redirect-notice" id="redirectNotice" style="display:none">
    <span class="dot"></span>
    <span id="redirectText">Reindirizzamento in corso…</span>
  </div>

  <!-- Store buttons -->
  <div class="store-buttons">
    <!-- App Store -->
    <a class="store-btn" id="btnApple"
       href="https://apps.apple.com/app/id6758016225"
       target="_blank" rel="noopener">
      <!-- Apple logo -->
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M18.64 6.03c.97-1.18 1.63-2.82 1.45-4.46-1.4.06-3.1.93-4.1 2.11-.9 1.03-1.69 2.7-1.48 4.3 1.56.12 3.14-.79 4.13-1.95z" fill="#e8ede9"/>
        <path d="M20.07 8.5c-2.28-.13-4.22 1.29-5.3 1.29-1.1 0-2.77-1.23-4.58-1.19-2.35.03-4.53 1.37-5.73 3.47-2.45 4.23-.64 10.5 1.75 13.94 1.17 1.69 2.56 3.57 4.39 3.5 1.75-.07 2.42-1.13 4.54-1.13 2.12 0 2.72 1.13 4.57 1.1 1.9-.04 3.1-1.72 4.27-3.42.54-.77.76-1.16 1.19-2.04-3.13-1.2-3.62-5.65-.52-7.37-.96-1.37-2.43-2.08-4.58-2.15z" fill="#e8ede9"/>
      </svg>
      <div class="btn-text">
        <span class="btn-label">Scarica su</span>
        <span class="btn-name">App Store</span>
      </div>
    </a>

    <div class="divider">oppure</div>

    <!-- Google Play -->
    <a class="store-btn" id="btnGoogle"
       href="https://play.google.com/store/apps/details?id=com.aerauliqa.aerauliqar"
       target="_blank" rel="noopener">
      <!-- Play logo -->
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M5 3.87 16.13 15 5 26.13A2 2 0 0 1 4 24.5V5.5A2 2 0 0 1 5 3.87z" fill="#e8ede9" opacity=".5"/>
        <path d="M20.5 11.5 7.5 4.1l9.9 9.9-9.9 9.9 13-7.4a2 2 0 0 0 0-5z" fill="#e8ede9" opacity=".9"/>
        <path d="M7.5 4.1 20.5 11.5 16.63 15.4 7.5 4.1z" fill="#e8ede9"/>
        <path d="M7.5 23.9l9.13-11.3 3.87 3.9L7.5 23.9z" fill="#e8ede9" opacity=".7"/>
      </svg>
      <div class="btn-text">
        <span class="btn-label">Disponibile su</span>
        <span class="btn-name">Google Play</span>
      </div>
    </a>
  </div>

  <footer>© 2026 Aerauliqa srl</footer>
</div>

<script>
  // ─── CONFIGURAZIONE ───────────────────────────────────────────
  const APPLE_URL  = 'https://apps.apple.com/app/id6758016225';      // ← sostituisci
  const GOOGLE_URL = 'https://play.google.com/store/apps/details?id=com.aerauliqa.aerauliqar'; // ← sostituisci
  const REDIRECT_DELAY_MS = 1200; // millisecondi prima del redirect automatico
  // ─────────────────────────────────────────────────────────────

  const ua = navigator.userAgent || '';
  const isIOS     = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  const notice = document.getElementById('redirectNotice');
  const noticeText = document.getElementById('redirectText');

  if (isIOS) {
    notice.style.display = 'flex';
    noticeText.textContent = 'Apertura App Store…';
    document.getElementById('btnApple').style.borderColor = 'rgba(168,240,198,0.4)';
    setTimeout(() => { window.location.href = APPLE_URL; }, REDIRECT_DELAY_MS);

  } else if (isAndroid) {
    notice.style.display = 'flex';
    noticeText.textContent = 'Apertura Google Play…';
    document.getElementById('btnGoogle').style.borderColor = 'rgba(168,240,198,0.4)';
    setTimeout(() => { window.location.href = GOOGLE_URL; }, REDIRECT_DELAY_MS);

  } else {
    // Desktop: nessun redirect automatico, mostra entrambi i pulsanti
    notice.style.display = 'none';
  }

  // Aggiorna gli href reali nei bottoni
  document.getElementById('btnApple').href  = APPLE_URL;
  document.getElementById('btnGoogle').href = GOOGLE_URL;
</script>
</body>
</html>
