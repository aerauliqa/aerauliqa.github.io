<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aerauliqa · Le nostre app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0b0f0e; --surface: #131918; --border: rgba(255,255,255,0.07); --accent: #a8f0c6; --text: #e8ede9; --muted: #6b7a71; --radius: 18px; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(168,240,198,0.08) 0%, transparent 70%); pointer-events: none; }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.5rem; gap: 2.5rem; }
    h1 { font-family: 'Fraunces', serif; font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 500; letter-spacing: -0.02em; text-align: center; animation: fadeUp .6s ease both; }
    h1 em { font-style: italic; font-weight: 300; color: var(--accent); }
    .subtitle { color: var(--muted); font-size: .9rem; text-align: center; margin-top: -.5rem; animation: fadeUp .6s .1s ease both; }
    .apps-grid { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 360px; animation: fadeUp .6s .2s ease both; }
    .app-card { display: flex; align-items: center; gap: 1.2rem; padding: 1.2rem 1.4rem; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); text-decoration: none; color: var(--text); transition: border-color .2s, transform .15s, box-shadow .2s; position: relative; overflow: hidden; }
    .app-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(120deg, rgba(168,240,198,0.04) 0%, transparent 60%); opacity: 0; transition: opacity .2s; }
    .app-card:hover { border-color: rgba(168,240,198,0.25); transform: translateY(-2px); box-shadow: 0 12px 36px rgba(0,0,0,0.35); }
    .app-card:hover::before { opacity: 1; }
    .card-icon { width: 52px; height: 52px; border-radius: 13px; background: linear-gradient(135deg, #1e2e26, #243329); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-icon svg { width: 26px; height: 26px; }
    .card-text { display: flex; flex-direction: column; gap: .2rem; }
    .card-name { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 500; }
    .card-desc { font-size: .78rem; color: var(--muted); }
    .card-arrow { margin-left: auto; color: var(--muted); font-size: 1.1rem; flex-shrink: 0; }
    footer { font-size: .72rem; color: var(--muted); animation: fadeUp .6s .3s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="page">
  <div>
    <h1>Le nostre <em>app</em></h1>
    <p class="subtitle">Scegli l'app che stai cercando</p>
  </div>

  <div class="apps-grid">
    <!-- App 1 -->
    <a class="app-card" href="/aerauliqar/">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="18" stroke="#a8f0c6" stroke-width="1.5" opacity=".4"/><circle cx="24" cy="24" r="8" fill="#a8f0c6" opacity=".9"/><line x1="24" y1="6" x2="24" y2="14" stroke="#a8f0c6" stroke-width="1.5" stroke-linecap="round" opacity=".5"/><line x1="24" y1="34" x2="24" y2="42" stroke="#a8f0c6" stroke-width="1.5" stroke-linecap="round" opacity=".5"/><line x1="6" y1="24" x2="14" y2="24" stroke="#a8f0c6" stroke-width="1.5" stroke-linecap="round" opacity=".5"/><line x1="34" y1="24" x2="42" y2="24" stroke="#a8f0c6" stroke-width="1.5" stroke-linecap="round" opacity=".5"/></svg>
      </div>
      <div class="card-text">
        <span class="card-name">AerauliqaR</span>
        <span class="card-desc">L'app di AERAULIQA per comunicare con il dispositivo R1</span>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <!-- Aggiungi altre app qui con lo stesso pattern -->
  </div>

  <footer>© 2026 Aerauliqa srl</footer>
</div>
</body>
</html>
